name: Refresh changelog

on:
  schedule:
    - cron: "24 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write

env:
  CHANGELOG_CONSOLE_REPOSITORY: NeuronSearchLab/nsl_admin_console_next
  CHANGELOG_TYPESCRIPT_SDK_REPOSITORY: NeuronSearchLab/neuronsearchlab-sdk-js
  CHANGELOG_PHP_SDK_REPOSITORY: NeuronSearchLab/neuronsearchlab-sdk-php
  CHANGELOG_MCP_REPOSITORY: NeuronSearchLab/mcp

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out docs
        uses: actions/checkout@v4
        with:
          path: docs

      - name: Validate changelog source access
        env:
          NSL_CHANGELOG_TOKEN: ${{ secrets.NSL_CHANGELOG_TOKEN }}
        run: |
          if [ -z "$NSL_CHANGELOG_TOKEN" ]; then
            echo "::error title=Missing NSL_CHANGELOG_TOKEN::Refresh changelog needs a token with Contents: read access to $CHANGELOG_CONSOLE_REPOSITORY, $CHANGELOG_TYPESCRIPT_SDK_REPOSITORY, $CHANGELOG_PHP_SDK_REPOSITORY, and $CHANGELOG_MCP_REPOSITORY."
            exit 1
          fi

          for repo in \
            "$CHANGELOG_CONSOLE_REPOSITORY" \
            "$CHANGELOG_TYPESCRIPT_SDK_REPOSITORY" \
            "$CHANGELOG_PHP_SDK_REPOSITORY" \
            "$CHANGELOG_MCP_REPOSITORY"
          do
            status="$(curl -sSL -o /tmp/changelog-repo.json -w "%{http_code}" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $NSL_CHANGELOG_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$repo")"

            if [ "$status" != "200" ]; then
              echo "::error title=Cannot read $repo::GitHub API returned HTTP $status. Check that NSL_CHANGELOG_TOKEN has Contents: read access to this repository."
              cat /tmp/changelog-repo.json
              exit 1
            fi
          done

      - name: Check out admin console
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CHANGELOG_CONSOLE_REPOSITORY }}
          path: nsl_admin_console_next
          token: ${{ secrets.NSL_CHANGELOG_TOKEN }}
          ref: master
          fetch-depth: 0

      - name: Check out TypeScript SDK
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CHANGELOG_TYPESCRIPT_SDK_REPOSITORY }}
          path: neuronsearchlab-sdk-js
          token: ${{ secrets.NSL_CHANGELOG_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Check out PHP SDK
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CHANGELOG_PHP_SDK_REPOSITORY }}
          path: neuronsearchlab-php-sdk
          token: ${{ secrets.NSL_CHANGELOG_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Check out MCP server
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CHANGELOG_MCP_REPOSITORY }}
          path: neuronsearchlab-mcp
          token: ${{ secrets.NSL_CHANGELOG_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Regenerate changelog
        run: node scripts/generate-changelog.mjs
        working-directory: docs

      - name: Commit changelog update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          repository: docs
          commit_message: "docs: refresh changelog"
          file_pattern: "changelog.mdx changelog/*.mdx"
